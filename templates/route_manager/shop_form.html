{% extends 'base.html' %}

{% block content %}
<div style="padding: 20px;">
    <h2>Update Garbage Weight for {{ shop.name }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update</button>
    </form>
    <a href="{% url 'shop-detail' shop.pk %}">Cancel</a>
</div>
{% endblock %}
